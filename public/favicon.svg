<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141515" />
      <stop offset="100%" stop-color="#0A0B0B" />
    </linearGradient>
    <!-- Accent Orange Gradient (Forged Hot Metal) -->
    <linearGradient id="orangeGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF3C00" />
      <stop offset="60%" stop-color="#FF6B00" />
      <stop offset="100%" stop-color="#FF9E00" />
    </linearGradient>
    <!-- Glow Filter for the Forged Spark and Accent -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Hexagonal Shield Base -->
  <polygon points="146,46 366,46 476,256 366,466 146,466 36,256" fill="url(#bgGrad)" stroke="url(#orangeGrad)" stroke-width="14" stroke-linejoin="round" />
  
  <!-- Subtle inner hex border -->
  <polygon points="156,64 356,64 456,256 356,448 156,448 56,256" fill="none" stroke="#FF6B00" stroke-width="2" stroke-opacity="0.3" stroke-linejoin="round" />

  <!-- Skewed Group for Athletic Action -->
  <g transform="translate(256, 256) skewX(-10) translate(-256, -256)">
    <!-- Sleek 'F' Forged Logo Mark -->
    <path d="M185,125 h145 l25,45 H235 v55 h85 l20,45 H235 v97 l-50,25 Z" fill="url(#orangeGrad)" filter="url(#glow)" />
    
    <!-- Forged Spark / Accent Diamond -->
    <path d="M350,222 L368,240 L350,258 L332,240 Z" fill="#FFFFFF" opacity="0.9" filter="url(#glow)" />
    
    <!-- Secondary shadow/glow F (offset back) -->
    <path d="M185,125 h145 l25,45 H235 v55 h85 l20,45 H235 v97 l-50,25 Z" fill="#FF3C00" opacity="0.15" transform="translate(8, 8)" />
  </g>
</svg>